app = "jobhunter-agent-igor"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  CRON_SCHEDULE = "0 */6 * * *"
  SCRAPER_PLATFORMS = "greenhouse,lever,remotive,remoteok,weworkremotely,himalayas,arbeitnow,wellfound"
  MAX_JOBS_PER_RUN = "50"
  LOG_LEVEL = "info"
  RUN_ON_STARTUP = "false"
  TZ = "America/Sao_Paulo"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[[mounts]]
  source = "logs_volume"
  destination = "/app/logs"
