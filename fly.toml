app = "jobhunter-agent-igor"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  # Agent cron and timezone — override via fly secrets if needed
  CRON_SCHEDULE = "0 */6 * * *"
  TZ = "America/Sao_Paulo"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
