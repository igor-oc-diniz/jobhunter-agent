app = "jobhunter-agent"
primary_region = "gru" # Sao Paulo, Brazil

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  CRON_SCHEDULE = "0 */6 * * *"
  SCRAPER_PLATFORMS = "greenhouse,lever,remotive,remoteok,weworkremotely,himalayas,arbeitnow,wellfound"
  MAX_JOBS_PER_RUN = "50"
  LOG_LEVEL = "info"
  TZ = "America/Sao_Paulo"
  HEALTH_PORT = "3001"
  RUN_ON_STARTUP = "false"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  
  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = "logs_volume"
  destination = "/app/logs"
